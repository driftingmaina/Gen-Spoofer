  <style>
    :root {
      --bg: #0a0a0c;
      --panel-bg: #121217;
      --accent: #9d4edd;
      --accent-hover: #c77dff;
      --text-main: #e0e0e0;
      --text-dim: #888;
      --border: #2d2d3a;
      --danger: #ff4d6d;
      --admin-gold: #ff9e00;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      background-image: radial-gradient(circle at 50% -20%, #3c096c 0%, #0a0a0c 80%);
      color: var(--text-main);
      min-height: 100vh;
      padding: 0;
    }

    #global-alert-bar {
      display: none;
      background: linear-gradient(90deg, #ff9e00, #ff4d6d);
      color: #000;
      text-align: center;
      padding: 12px;
      font-weight: 900;
      font-size: 0.9rem;
      position: sticky;
      top: 0;
      z-index: 9999;
      border-bottom: 2px solid #fff;
      text-transform: uppercase;
    }

    .container { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }

    h1 { color: var(--accent); font-size: 1.5rem; letter-spacing: 3px; text-transform: uppercase; font-weight: 800; }

    .panel {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    #admin-trigger-btn {
      display: none;
      background: var(--admin-gold);
      color: #000;
      font-size: 0.7rem;
      padding: 5px 12px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      border: none;
    }

    #admin-panel { display: none; border: 1px solid var(--admin-gold); background: rgba(255, 158, 0, 0.03); }

    h2 { color: var(--text-main); font-size: 1rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 10px; }
    h2::before { content: ''; width: 4px; height: 18px; background: var(--accent); border-radius: 2px; }

    .form-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; flex: 1; min-width: 180px; }
    label { font-size: 0.75rem; color: var(--accent); font-weight: bold; }

    input { background: #1a1a22; border: 1px solid var(--border); border-radius: 6px; color: var(--text-main); padding: 0.7rem; outline: none; }

    button {
      background: var(--accent); border: none; border-radius: 6px; color: white;
      cursor: pointer; font-size: 0.85rem; font-weight: 600; padding: 0.7rem 1.2rem;
    }

    button:hover { background: var(--accent-hover); }
    button.admin-btn { background: var(--admin-gold); color: black; margin-right: 10px; }

    .steam-display {
      margin-top: 1rem; padding: 1.2rem; background: #000;
      border: 1px dashed var(--accent); border-radius: 8px;
      display: none; font-family: 'Courier New', monospace; font-size: 0.9rem; line-height: 1.5;
    }

    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    thead th { background: #1a1a22; color: var(--accent); text-align: left; padding: 1rem; font-size: 0.75rem; }
    td { padding: 1rem; font-size: 0.9rem; border-bottom: 1px solid var(--border); }

async function hashIP(ip) {
    const msgBuffer = new TextEncoder().encode(ip);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function auth() {
    try {
      const res = await fetch('https://api.ipify.org?format=json');
      const data = await res.json();
      const visitorHash = await hashIP(data.ip); 
      
      // Verification check
      if (visitorHash === AUTH_HASH) {
        document.getElementById('admin-trigger-btn').style.display = 'block';
      }
    } catch(e) {
      console.log("Auth connection failed.");
    }
  }

  function toggleAdmin() { const p = document.getElementById('admin-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }
  
  function postAnnouncement() {
    const msg = document.getElementById('announcement-input').value;
    if (msg) {
      localStorage.setItem('global_announcement', msg);
      showAnnouncement(msg);
      document.getElementById('admin-status').textContent = "Broadcast Active.";
    }
  }

  function clearAnnouncement() {
    localStorage.removeItem('global_announcement');
    document.getElementById('global-alert-bar').style.display = 'none';
    document.getElementById('admin-status').textContent = "Broadcast Cleared.";
  }

  function showAnnouncement(msg) {
    const bar = document.getElementById('global-alert-bar');
    bar.textContent = `SYSTEM BROADCAST: ${msg}`;
    bar.style.display = 'block';
  }

  function addKey() {
    const list = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    const entry = {
      id: Date.now().toString(36),
      cat: document.getElementById('cat').value || '?',
      prod: document.getElementById('product').value || '?',
      val: document.getElementById('keyval').value
    };
    if(!entry.val) return alert("Key cannot be empty");
    list.push(entry);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    renderKeys();
    document.getElementById('keyval').value = '';
  }

  function renderKeys() {
    const list = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    document.getElementById('key-table-body').innerHTML = list.map(e => `
      <tr>
        <td style="color:var(--accent)">${e.cat}</td>
        <td>${e.prod}</td>
        <td style="cursor:pointer; font-family:monospace" onclick="revealedIds.has('${e.id}')?revealedIds.delete('${e.id}'):revealedIds.add('${e.id}');renderKeys()">
          ${revealedIds.has(e.id) ? e.val : '••••••••'}
        </td>
        <td>
          <button style="background:var(--danger); padding: 4px 8px; font-size:0.7rem;" onclick="deleteKey('${e.id}')">DEL</button>
        </td>
      </tr>`).join('');
  }

  function deleteKey(id) {
    const list = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list.filter(x => x.id !== id)));
    renderKeys();
  }

  function claimAccount() {
    const last = localStorage.getItem('lastSteamClaim');
    if (last && Date.now() - last < 864e5) return alert("System Locked: 24h wait.");
    const acc = steamAccounts[Math.floor(Math.random() * steamAccounts.length)];
    document.getElementById('steam-result').style.display = 'block';
    document.getElementById('acc-details').innerHTML = `<b>ACC:</b> ${acc.u}<br><b>PW:</b> ${acc.p}${acc.extra ? '<br>'+acc.extra : ''}`;
    localStorage.setItem('lastSteamClaim', Date.now());
    checkCooldown();
  }

  function checkCooldown() {
    const last = localStorage.getItem('lastSteamClaim');
    const wait = last && Date.now() - last < 864e5;
    document.getElementById('steam-btn').disabled = wait;
    document.getElementById('steam-cooldown').textContent = wait ? "Access Denied." : "Ready.";
  }

  function skipCooldown() { localStorage.removeItem('lastSteamClaim'); checkCooldown(); document.getElementById('admin-status').textContent = "Override Successful."; }
  function copyData() { navigator.clipboard.writeText(document.getElementById('acc-details').innerText); alert("Copied."); }
  setInterval(() => document.getElementById('sys-clock').textContent = new Date().toLocaleTimeString(), 1000);

  window.onload = () => {
    const msg = localStorage.getItem('global_announcement');
    if (msg) showAnnouncement(msg);
    auth(); renderKeys(); checkCooldown();
  };
